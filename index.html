<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Say Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Simon Says Game 
    </h1>
    <h2>Press any key to start</h2>
    <div class="btn-container">
        <!-- quadrants of circle -->
        <div id="a" class="btn">1</div>
        <div id="b" class="btn">2</div>
        <div id="c" class="btn">3</div>
        <div id="d" class="btn">4</div>
        <!-- counter display in center -->
        <div id="counter">0</div>
    </div>
    
</body>
<script src = "script.js"></script>
</html>
